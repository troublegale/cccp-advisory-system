upstream admin_backend {
    server admin:8001;
}

upstream query_backend {
    server query:8000;
}

upstream admin_frontend {
    server admin-frontend:3000;
}

upstream query_widget {
    server query-widget:3001;
}

server {
    listen 80;

    location /api/v1/knowledge-base/ {
        proxy_pass http://admin_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50m;
    }

    location /ask {
        proxy_pass http://query_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /widget {
        rewrite ^/widget(/.*)$ $1 break;
        rewrite ^/widget$ / break;
        proxy_pass http://query_widget;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /demo {
        alias /usr/share/nginx/html/demo.html;
        default_type text/html;
    }

    location / {
        proxy_pass http://admin_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
