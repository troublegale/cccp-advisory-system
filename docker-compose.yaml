services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin
      - query

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./admin/scripts/ollama-entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]

  admin:
    build: ./admin
    volumes:
      - ./admin/knowledge:/app/knowledge:ro
    depends_on:
      - qdrant
      - ollama
    environment:
      - RAG_OLLAMA_BASE_URL=http://ollama:11434
      - RAG_QDRANT_HOST=qdrant
    restart: on-failure

  query:
    build: ./query
    depends_on:
      - qdrant
      - ollama
    environment:
      - RAG_OLLAMA_BASE_URL=http://ollama:11434
      - RAG_QDRANT_HOST=qdrant
    restart: on-failure

volumes:
  qdrant_data:
  ollama_data:
