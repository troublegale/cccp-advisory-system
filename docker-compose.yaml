services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./info.md:/app/info.md:ro
    depends_on:
      - qdrant
      - ollama
    environment:
      - RAG_OLLAMA_BASE_URL=http://ollama:11434
      - RAG_QDRANT_HOST=qdrant
    restart: on-failure

volumes:
  qdrant_data:
  ollama_data:
