services:
  admin-frontend:
    build: ./admin-frontend
    expose:
      - "3000"

  query-widget:
    build: ./query-widget
    expose:
      - "3001"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin
      - query
      - admin-frontend
      - query-widget

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: admin_db
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./admin/scripts/ollama-entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]

  admin:
    build: ./admin
    volumes:
      - ./admin/knowledge:/app/knowledge:ro
    depends_on:
      - qdrant
      - ollama
      - postgres
      - minio
    environment:
      - RAG_OLLAMA_BASE_URL=http://ollama:11434
      - RAG_QDRANT_HOST=qdrant
      - RAG_DATABASE_URL=postgresql+psycopg2://admin:secret@postgres:5432/admin_db
      - RAG_MINIO_ENDPOINT=minio:9000
      - RAG_MINIO_ACCESS_KEY=minioadmin
      - RAG_MINIO_SECRET_KEY=minioadmin
    restart: on-failure

  query:
    build: ./query
    depends_on:
      - qdrant
      - ollama
    environment:
      - RAG_OLLAMA_BASE_URL=http://ollama:11434
      - RAG_QDRANT_HOST=qdrant
    restart: on-failure

volumes:
  qdrant_data:
  ollama_data:
  postgres_data:
  minio_data:
